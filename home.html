<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NormandX - Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo" onclick="location.href='home.html'"><span>Normand</span><span>X</span></div>
    <input class="search" placeholder="Rechercher une vidéo..." oninput="search(this.value)">
    <div class="account-container">
        <div class="account" onclick="toggleMenu()"></div>
        <div class="menu" id="menu">
            <a href="account.html">👤 Mon Historique</a>
            <a href="favorites.html">❤️ Mes Favoris</a>
            <hr style="border:0; border-top:1px solid #333">
            <a onclick="logout()">🚪 Déconnexion</a>
        </div>
    </div>
</header>

<div class="layout">
    <aside>
        <a onclick="render(allVideos)">🔥 Nouveautés</a>
        <a onclick="filter('Hetero')">Hétéro</a>
        <a onclick="filter('Gays')">Gays</a>
        <a onclick="filter('MILF')">MILF</a>
    </aside>

    <main>
        <div class="grid" id="videoGrid"></div>
    </main>
</div>

<script>
const user = localStorage.getItem("connected");
if(!user) location.href="auth.html";

// Base de données simulée (Assure-toi que les chemins images/vidéos sont bons)
const allVideos = [
    {id:1, t:"Première Vidéo", c:"Hetero", i:"https://via.placeholder.com/300x170", v:"#"},
    {id:2, t:"Spécial MILF", c:"MILF", i:"https://via.placeholder.com/300x170", v:"#"},
    {id:3, t:"Contenu Gay", c:"Gays", i:"https://via.placeholder.com/300x170", v:"#"}
];
// On sauvegarde pour les autres pages
localStorage.setItem("videos", JSON.stringify(allVideos));

function toggleMenu(){ document.getElementById('menu').classList.toggle('show'); }
function logout(){ localStorage.removeItem("connected"); location.href="auth.html"; }

function render(list){
    const grid = document.getElementById("videoGrid");
    grid.innerHTML = "";
    const likes = JSON.parse(localStorage.getItem("likes_"+user) || "[]");
    const favs = JSON.parse(localStorage.getItem("fav_"+user) || "[]");

    list.forEach(v => {
        grid.innerHTML += `
        <div class="card">
            <img src="${v.i}" onclick="openVideo(${v.id})">
            <p>${v.t}</p>
            <div class="actions">
                <button class="like ${likes.includes(v.id)?'active':''}" onclick="handleAction('likes', ${v.id}, this)">👍</button>
                <button class="fav ${favs.includes(v.id)?'active':''}" onclick="handleAction('fav', ${v.id}, this)">❤</button>
            </div>
        </div>`;
    });
}

function handleAction(type, id, btn){
    let data = JSON.parse(localStorage.getItem(type + "_" + user) || "[]");
    if(data.includes(id)){
        data = data.filter(x => x !== id);
        btn.classList.remove("active");
    } else {
        data.push(id);
        btn.classList.add("active");
    }
    localStorage.setItem(type + "_" + user, JSON.stringify(data));
}

function search(q){
    const filtered = allVideos.filter(v => v.t.toLowerCase().includes(q.toLowerCase()));
    render(filtered);
}

function filter(c){
    const filtered = allVideos.filter(v => v.c === c);
    render(filtered);
}

function openVideo(id){
    let h = JSON.parse(localStorage.getItem("history_"+user) || "[]");
    h = [id, ...h.filter(x => x !== id)]; // Ajoute au début et enlève les doublons
    localStorage.setItem("history_"+user, JSON.stringify(h.slice(0,20))); // Max 20 items
    location.href = "video.html?id=" + id;
}

// Initialisation
render(allVideos);

// Fermer le menu si on clique ailleurs
window.onclick = function(event) {
  if (!event.target.matches('.account')) {
    document.getElementById('menu').classList.remove('show');
  }
}
</script>
</body>
</html>
