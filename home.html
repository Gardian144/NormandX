<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NormandX | Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo" onclick="location.href='home.html'"><span>Normand</span><span>X</span></div>
    
    <div class="search-container">
        <input class="search" placeholder="Rechercher une vidéo..." oninput="search(this.value)">
    </div>

    <div class="account-area">
        <div class="account-btn" onclick="toggleMenu()"></div>
        <div class="menu" id="userMenu">
            <a href="account.html">📊 Mon Historique</a>
            <a href="favorites.html">❤️ Mes Favoris</a>
            <a onclick="logout()" style="color:#ff5f7a">🚪 Déconnexion</a>
        </div>
    </div>
</header>

<div class="layout">
    <aside id="sidebar">
        <a onclick="render(videos)" class="active">🔥 Nouveautés</a>
        <a onclick="filter('Hetero')">🎬 Hétéro</a>
        <a onclick="filter('Gays')">🌈 Gays</a>
        <a onclick="filter('MILF')">👩 MILF</a>
    </aside>

    <main>
        <div class="grid" id="videoGrid"></div>
    </main>
</div>

<script>
// 1. DATA (Remplace les liens .jpg et .mp4 par tes vrais fichiers)
const videos = [
    {id:1, t:"Ma Première Vidéo", c:"Hetero", i:"thumbs/1.jpg", v:"videos/1.mp4"},
    {id:2, t:"Spécial MILF intense", c:"MILF", i:"thumbs/2.jpg", v:"videos/2.mp4"},
    {id:3, t:"Contenu Gays Premium", c:"Gays", i:"thumbs/3.jpg", v:"videos/3.mp4"}
];

const user = localStorage.getItem("connected");
if(!user) location.href="auth.html";

// Sauvegarde globale pour les autres pages
localStorage.setItem("videos", JSON.stringify(videos));

// 2. FONCTIONS INTERFACE
function toggleMenu(){ document.getElementById('userMenu').classList.toggle('show'); }

function render(data){
    const grid = document.getElementById("videoGrid");
    grid.innerHTML = "";
    
    const likes = JSON.parse(localStorage.getItem("likes_"+user) || "[]");
    const favs = JSON.parse(localStorage.getItem("fav_"+user) || "[]");

    data.forEach(vid => {
        grid.innerHTML += `
        <div class="card">
            <div class="thumb-container" onclick="goToVideo(${vid.id})">
                <img src="${vid.i}" onerror="this.src='https://via.placeholder.com/300x170?text=No+Image'">
                <video src="${vid.v}" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
            </div>
            <div class="card-info">
                <p>${vid.t}</p>
                <div class="actions">
                    <button class="btn-action ${likes.includes(vid.id)?'active':''}" onclick="handleSocial('likes',${vid.id},this)">👍</button>
                    <button class="btn-action ${favs.includes(vid.id)?'active':''}" onclick="handleSocial('fav',${vid.id},this)">❤️</button>
                </div>
            </div>
        </div>`;
    });
}

// 3. LOGIQUE
function handleSocial(type, id, btn){
    let storage = JSON.parse(localStorage.getItem(type+"_"+user) || "[]");
    if(storage.includes(id)){
        storage = storage.filter(x => x !== id);
        btn.classList.remove("active");
    } else {
        storage.push(id);
        btn.classList.add("active");
    }
    localStorage.setItem(type+"_"+user, JSON.stringify(storage));
}

function filter(cat){
    const filtered = videos.filter(v => v.c === cat);
    render(filtered);
}

function search(val){
    const filtered = videos.filter(v => v.t.toLowerCase().includes(val.toLowerCase()));
    render(filtered);
}

function goToVideo(id){
    // Ajout historique
    let hist = JSON.parse(localStorage.getItem("history_"+user) || "[]");
    hist = [id, ...hist.filter(x => x !== id)].slice(0,20);
    localStorage.setItem("history_"+user, JSON.stringify(hist));
    
    location.href = "video.html?id=" + id;
}

function logout(){
    localStorage.removeItem("connected");
    location.href = "auth.html";
}

// Lancement
render(videos);

// Fermer menu si clic ailleurs
window.onclick = e => {
    if(!e.target.classList.contains('account-btn')) document.getElementById('userMenu').classList.remove('show');
}
</script>
</body>
</html>
